name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install black isort flake8

      - name: Check formatting (black)
        run: black --check --line-length 100 src/ config/ tests/

      - name: Check import order (isort)
        run: isort --check-only --profile black --line-length 100 src/ config/ tests/

      - name: Lint (flake8)
        run: flake8 src/ config/ --max-line-length 120 --extend-ignore E501,W503,F401,F541,F841,E402,E203

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run ETL to generate test database
        run: python main.py --mode etl
        continue-on-error: true

      - name: Run analysis to generate charts
        run: python main.py --mode analysis
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not slow" \
            --ignore=tests/test_fetch_smoke.py

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from config.settings import PROJECT_ROOT; print('Config OK')"

      - name: Verify main entry point
        run: python main.py --list
